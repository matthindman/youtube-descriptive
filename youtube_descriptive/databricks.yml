# This is a Databricks asset bundle definition for youtube_descriptive.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: youtube_descriptive
  uuid: 11eda43f-218b-4c9a-9c4f-0c6ca0553ff9

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-1335559103600339.19.azuredatabricks.net
    variables:
      catalog: dev_sean
      schema: dev
    presets:
      artifacts_dynamic_version: true
  prod:
    mode: production
    workspace:
      host: https://adb-1335559103600339.19.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/sean.norton@researchaccelerator.org to make sure we only have a single copy.
      root_path: /Workspace/Users/sean.norton@researchaccelerator.org/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: dev_sean
      schema: prod
    permissions:
      - user_name: sean.norton@researchaccelerator.org
        level: CAN_MANAGE
